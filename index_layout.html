<style>

div {
  border: 6px solid mediumturquoise;
  background-color: gray;
}

.main {
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100%;
  aspect-ratio: 1/2;
}

.board {
  height: 100%;
}

.board canvas {
  height: 100%;
  aspect-ratio: 1/2;
  border: 1px solid red;
}

.footer {
  width: 80%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
}

.ctrl {
  height: 4em;
}

.ctrlFull {
  grid-column: 1 / span 2;
}

</style>

</head>

<body>


<div class="main">

<div class="header">
Pont: 10
</div>

<div class="board">
<canvas></canvas>
</div>

<div class="footer">

<button class="ctrl ctrlLeft"> <- </button>
<button class="ctrl ctrlRight"> -> </button>
<button class="ctrl ctrlFull"> DD </button>

</div>


</div>


</body>
</html>
